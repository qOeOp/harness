schema_version = 2
runtime_model = "task-record"
source_repo_pure = true

required_directories = [
  ".harness",
  ".harness/tasks",
  ".harness/locks",
]

generated_files = [
  ".harness/entrypoint.md",
  ".harness/README.md",
  ".harness/manifest.toml",
]

optional_support_paths = [
  ".harness/runtime",
  ".harness/runtime/<tool>",
]

lazily_created_paths = [
  ".harness/tasks/<task-id>",
  ".harness/tasks/<task-id>/task.md",
  ".harness/tasks/<task-id>/attachments",
]

[runtime_support]
root = ".harness/runtime"
durable_state_requires_explicit_version = true
cross_version_resume_policy = "migrate-or-fail-closed"

[locks]
root = ".harness/locks"
required_metadata_files = [
  "owner",
  "claimed_at",
  "lease_expires_at",
  "lease_id",
  "pid",
]
stale_reclaim_policy = "expired-lease-or-dead-pid"

[task_record]
header_required = [
  "Schema version",
  "State authority",
  "State version",
  "Last operation ID",
  "ID",
  "Title",
  "Type",
  "Status",
  "Priority",
  "Owner",
  "Sponsor",
  "Assignee",
  "Worktree",
  "Claimed at",
  "Claim expires at",
  "Lease version",
  "Objective",
  "Ready criteria",
  "Done criteria",
  "Current stage owner",
  "Current stage role",
  "Next gate",
  "Founder escalation",
  "Decision status",
  "Review status",
  "QA status",
  "UAT status",
  "Acceptance status",
  "Blocked by",
  "Current blocker",
  "Next handoff",
  "Linked attachments",
  "Created at",
  "Updated at",
  "Archived at",
]

primary_statuses = [
  "backlog",
  "planning",
  "ready",
  "in-progress",
  "review",
  "paused",
  "done",
  "killed",
  "archived",
]

gate_fields = [
  "Decision status",
  "Review status",
  "QA status",
  "UAT status",
  "Acceptance status",
]

recommended_sections = [
  "Summary",
  "Recovery",
  "Workflow Notes",
  "Signoff Notes",
  "Attachment Notes",
  "Transition Log",
  "Notes",
]

[interrupts]
slow_human_gates_require_pause_resume = true
paused_status_carries_interrupt_metadata = true
resume_is_checkpoint_relative_reentry = true
resume_must_not_assume_instruction_pointer_continuation = true
pre_boundary_side_effects_require_idempotency_or_effect_fence = true

[checkpoints]
checkpoint_is_compression_boundary = true
checkpoint_durability_or_flush_boundary_must_be_explicit = true
checkpoint_flush_boundary_examples = [
  "sync",
  "async",
  "exit",
]
checkpoint_crash_safety_scope_must_not_be_implicit = true

[wakeup]
cross_run_wait_requires_explicit_handle_or_event = true
async_delivery_model = "at-least-once"
async_wakeup_requires_dedupe_or_idempotency_key = true
live_socket_or_stream_is_not_a_wakeup_contract = true
receiver_generated_background_handles_should_be_reused = true
runtime_must_not_create_shadow_polling_state_when_protocol_exposes_handle = true

[transport_state]
provider_or_sdk_handles_are_transport_state_only = true
transport_continuity_does_not_imply_instruction_continuity = true
instruction_surface_must_be_explicitly_rebound_on_resume = true
provider_native_reasoning_or_compaction_is_continuation_payload_only = true
provider_background_or_pollable_modes_may_require_provider_stored_state = true
provider_transport_state_may_carry_retention_or_zdr_constraints = true
provider_stored_state_is_not_zero_retention_truth = true

[prompt_shape]
runtime_config_surface_is_distinct_from_task_truth = true
exact_prefix_stability_is_runtime_discipline = true
task_delta_and_tool_observations_append_at_tail = true
mid_run_config_change_requires_explicit_transition = true
prefix_breaking_changes = [
  "model-snapshot",
  "tool-set",
  "tool-order",
  "sandbox-config",
  "approval-mode",
  "cwd",
]

[active_run]
runtime_revision_binding_required = true
tool_contract_binding_required = true
prompt_bundle_or_policy_snapshot_binding_required = true
cross_deploy_old_and_new_revisions_may_coexist_until_completion_or_migration = true
active_run_must_not_silent_hot_swap = true

[persisted_context]
serialized_context_requires_explicit_version = true
serialized_context_cross_version_policy = "migrate-or-fail-closed"
serialized_context_must_not_store_raw_secrets = true
serialized_context_should_prefer_handles_scope_and_expiry = true

[subagent_memory]
auto_injected_memory_is_instruction_surface = true
auto_injected_memory_is_persisted_data = true
auto_injected_memory_is_capability_grant = true
durable_facts_must_fall_back_to_task_truth = true

[hooks]
resume_or_compact_may_retrigger_dynamic_hooks = true
hook_logic_should_be_cheap_idempotent_and_reentrant = true

[observability]
source_provenance_must_survive_display_projection = true
provenance_examples = [
  "tool",
  "human-approval",
  "external-evidence",
  "framework-note",
]
builtin_tracing_defaults_require_explicit_capture_policy = true
builtin_tracing_defaults_require_explicit_redaction_policy = true
builtin_tracing_defaults_require_disable_path = true
builtin_tracing_must_avoid_double_reporting_or_semantic_conflict = true

[verification]
deterministic_gate_precedes_trace_or_llm_eval = true
tool_using_eval_should_separate_end_state_tool_choice_and_arg_correctness = true
exact_trajectory_is_not_default_pass_condition = true
exact_tool_sequence_only_matters_when_contractual = true
multi_component_eval_may_award_partial_credit = true

[guardrails]
side_effect_prevention_requires_blocking_preflight_or_wrapper = true
parallel_or_posthoc_guardrail_is_not_sufficient = true
guardrail_pipeline_coverage_must_be_explicit = true

[capability_grants]
mcp_roots_are_operational_boundary_not_just_discovery_scope = true
mcp_root_exposure_and_path_mapping_require_explicit_validation = true
untrusted_tool_annotations_are_planning_or_routing_hints_only = true
mcp_oauth_tokens_must_be_audience_bound = true
mcp_oauth_client_must_send_resource = true
mcp_oauth_server_must_not_passthrough_client_token = true

[claims]
active_statuses_require_assignee_worktree_claim = true
active_statuses = [
  "in-progress",
  "paused",
]
default_claim_lease = "renewable-hours-lease"
default_claim_lease_hours_env = "HARNESS_CLAIM_LEASE_HOURS"

[query_surface]
persisted_boards = false
shell_generated_views = true
default_excludes_archived = true
explicit_current_task_pointer = false
task_local_writeback = "explicit work-item required"

[notes]
task_truth = "task.md is the only task source of truth in v2 core"
archive_semantics = "archived is represented by task status plus Archived at"
attachment_routing = "task-local materials live under attachments/ and are linked from task.md"
acceptance_tracking = "long-running feature or acceptance checklist should prefer a task-local, update-only acceptance ledger under attachments/ with status/checklist plus evidence references rather than full-spec rewrites"
recovery_model = "Recovery lives inside task.md as part of the task record"
steady_state_resume = "resume reads task truth and recovery first, then runs a cheap baseline check before continuing"
checkpoint_model = "checkpoint is a compression boundary whose durability or flush semantics must be explicit rather than implied"
lock_model = "runtime lock directories carry owner plus lease-expiry metadata and are stale-reclaimed on expiry or dead pid"
claim_model = "active task claims carry assignee, worktree, claimed-at, claim-expiration, and lease-version metadata"
runtime_support_boundary = ".harness/runtime is reserved for non-canonical tool-owned support state when needed"
runtime_support_versioning = "durable runtime support state must carry explicit schema or format version"
cross_version_restore_policy = "runtime support state must migrate or fail closed across code versions"
slow_human_gate_model = "slow human review, approval, or feedback uses paused plus resume rather than hidden in-flight waiting"
observability_capture = "prefer evidence references, object handles, or content hashes over default full-content telemetry capture"
interrupt_resume_model = "resume is checkpoint-relative re-entry rather than instruction-pointer continuation"
async_wakeup_model = "cross-run wakeups assume at-least-once delivery and require dedupe or idempotency"
source_provenance = "tool, approval, evidence, and framework-origin metadata should remain explicit across display projections"
transport_state_boundary = "provider and SDK continuation handles preserve transport continuity, not instruction continuity"
prompt_shape_boundary = "static instructions, examples, tool name/description/argument schema/output contract, image descriptors, and sandbox/cwd/approval metadata form a runtime config surface distinct from task truth; tool outputs should prefer handles, locators, or page tokens over inline blobs when large or paged"
prompt_shape_stability = "long-running sessions should keep the exact prefix stable and append new task delta or tool observations at the tail"
prefix_breaking_change_model = "changes to model, tool set/order, sandbox, approval mode, or cwd should be treated as explicit transitions rather than silent drift"
active_run_binding = "active runs should bind runtime revision, tool contract, and prompt bundle or policy snapshot, and must not silent-hot-swap across deployments"
persisted_context_boundary = "serialized app, agent, or session context is persisted data, must be versioned, and should not store raw secrets"
provider_stored_state_boundary = "provider-side stored state used by background or pollable transport remains transport state and may carry retention or ZDR limits"
subagent_memory_boundary = "auto-injected subagent or project memory is instruction surface plus persisted data plus capability grant, not canonical task truth"
observability_default_boundary = "built-in tracing defaults require explicit capture, redaction, and disable controls rather than vendor-default trust"
guardrail_boundary = "parallel or posthoc guardrails do not replace blocking preflight, tool wrappers, or approval gates for side-effect prevention"
mcp_oauth_boundary = "MCP OAuth should use audience-bound tokens with explicit resource and must not passthrough client tokens upstream"
