schema_version = 1
bundle_slug = "acceptance-review"
bundle_version = 1
bundle_kind = "review-skill"
summary = "Review a runnable slice with explicit acceptance criteria, boundaries, and verification honesty."

owner_role = "risk-quality-lead"
scope = "source-baseline"
maturity = "candidate"

context_strategy = "artifact-first"
delegation_mode = "manager-optional"
entrypoints = ["chat", "review", "work-item"]
activation_modes = ["explicit", "router"]
output_modes = ["summary", "artifact-path"]

allowed_tools = ["read", "write", "web"]
read_roots = ["skills/acceptance-review/", "docs/workflows/", "references/"]
write_roots = [".harness/tasks/<task-id>/attachments/", ".harness/tasks/<task-id>/closure/"]
forbidden_roots = ["roles/", ".harness/workspace/roles/"]

default_artifact_type = "acceptance-review-brief"
default_artifact_path = ".harness/tasks/<task-id>/attachments/"
lazy_load_paths = ["refs/", "templates/"]
