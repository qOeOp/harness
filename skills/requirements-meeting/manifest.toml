schema_version = 1
bundle_slug = "requirements-meeting"
bundle_version = 1
bundle_kind = "task-skill"
summary = "Translate approved vision into iteration scope, acceptance criteria, dependencies, and demo boundary."

owner_role = "general-manager"
scope = "source-baseline"
maturity = "candidate"

context_strategy = "artifact-first"
delegation_mode = "manager-optional"
entrypoints = ["chat", "review", "work-item"]
activation_modes = ["explicit", "router"]
output_modes = ["summary", "artifact-path"]

allowed_tools = ["read", "write", "web"]
read_roots = ["skills/requirements-meeting/", "docs/workflows/", "references/"]
write_roots = [".harness/tasks/<task-id>/attachments/"]
forbidden_roots = ["roles/", ".harness/workspace/roles/"]

default_artifact_type = "requirements-meeting-brief"
default_artifact_path = ".harness/tasks/<task-id>/attachments/"
lazy_load_paths = ["refs/", "templates/"]
