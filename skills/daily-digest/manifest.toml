schema_version = 1
bundle_slug = "daily-digest"
bundle_version = 1
bundle_kind = "governance-skill"
summary = "Consolidate advanced-governance daily department reports into one company digest."

owner_role = "general-manager"
scope = "source-baseline"
maturity = "candidate"

context_strategy = "artifact-first"
delegation_mode = "local-only"
entrypoints = ["chat", "automation", "script"]
activation_modes = ["explicit", "state-gate"]
output_modes = ["summary", "artifact-path"]

allowed_tools = ["read", "write", "shell"]
read_roots = ["skills/daily-digest/", "docs/workflows/", ".harness/workspace/departments/"]
write_roots = [".harness/workspace/status/digests/"]
forbidden_roots = ["roles/", ".harness/workspace/roles/"]

default_artifact_type = "company-daily-digest"
default_artifact_path = ".harness/workspace/status/digests/"
lazy_load_paths = ["refs/", "templates/", "scripts/"]
preferred_scripts = ["skills/daily-digest/scripts/new_digest.sh"]
